name: Update Homebrew Formula

on:
  push:
    tags:
      - "v*"

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download tarball and compute sha256
        id: sha
        run: |
          curl -sL "https://github.com/EliaTolin/supawho/archive/refs/tags/${{ steps.tag.outputs.version }}.tar.gz" -o tarball.tar.gz
          echo "sha256=$(shasum -a 256 tarball.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: EliaTolin/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          cat > Formula/supawho.rb << 'FORMULA'
          class Supawho < Formula
            desc "CLI tool to manage multiple Supabase accounts via macOS Keychain"
            homepage "https://github.com/EliaTolin/supawho"
            url "https://github.com/EliaTolin/supawho/archive/refs/tags/TAG.tar.gz"
            sha256 "SHA"
            license "MIT"

            def install
              bin.install "supawho"
            end

            test do
              assert_match "supawho", shell_output("#{bin}/supawho help")
            end
          end
          FORMULA
          sed -i "s|TAG|${{ steps.tag.outputs.version }}|g" Formula/supawho.rb
          sed -i "s|SHA|${{ steps.sha.outputs.sha256 }}|g" Formula/supawho.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/supawho.rb
          git commit -m "Update supawho to ${{ steps.tag.outputs.version }}"
          git push
